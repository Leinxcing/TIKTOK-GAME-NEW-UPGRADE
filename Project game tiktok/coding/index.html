<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boys vs Girls Battle</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="settings.css">
</head>
<body>

<div class="game-container">

    <!-- AREA KLIK TETAP -->
    <div id="girlsZone"></div>
    <div id="boysZone"></div>

    <!-- GIRLS -->
    <div class="team girls" id="girlsSide">

    <div class="score-box left">
    <span id="girlsScore">0</span>
    <div id="girlsTeamName">TEAM GIRLS</div>
    </div>

    <div class="character">
        <img src="girls.png" id="girlsCharacter" alt="Girls">
    </div>

    <div class="click-counter">
        <img src="jamur.png" class="mushroom-icon">
        <span id="girlsClicks">0</span>
    </div>

</div>




    <!-- CENTER -->
    <div class="center-line" id="battleLine"></div>

    <div class="live-badge">
    <img src="live.png" alt="LIVE">
    </div>

    <!-- BOYS -->
    <div class="team boys" id="boysSide">
        <div class="score-box right">
    <div id="boysTeamName">TEAM BOYS</div>
    <span id="boysScore">0</span>
    </div>

            
        <div class="character">
             <img src="boys1.png" id="boysCharacter" alt="Boys">
        </div>

        <div class="click-counter">
    <img src="jamur.png" class="mushroom-icon">
    <span id="boysClicks">0</span>
</div>

</div>

</div> <!-- game-container -->
<div id="winnerPopup" class="winner-popup">

    <div class="popup-content">

        <img id="winnerImage" src="" alt="Winner">

    </div>

</div>

<!-- SETTINGS BUTTON -->
<div id="settingsBtn">
⚙
</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="hide">

    <div class="settings-header">
        CONTROL PANEL
    </div>
    <div class="tab-menu">

    <button class="tab-btn active"
            data-tab="generalTab">
        GENERAL
    </button>

    <button class="tab-btn"
        data-tab="characterTab">
    CHARACTER
    </button>

    <button class="tab-btn"
        data-tab="effectsTab">
    EFFECTS
    </button>

    <button class="tab-btn"
        data-tab="presetTab">
    PRESET
    </button>

</div>
<div id="generalTab" class="tab-content active">
    <!-- TEAM NAME -->
    <div class="settings-section">

        <h3>TEAM NAME</h3>

        <label>LEFT TEAM</label>
        <input type="text"
               id="girlsNameInput"
               value="TEAM GIRLS">

        <label>RIGHT TEAM</label>
        <input type="text"
               id="boysNameInput"
               value="TEAM BOYS">

    </div>

    <!-- TITLE COLORS -->
    <div class="settings-section">

        <h3>TITLE COLORS</h3>

        <label>Girls</label>
        <input type="color"
               id="girlsTitleColor"
               value="#b700ff">

        <label>Boys</label>
        <input type="color"
               id="boysTitleColor"
               value="#00b7ff">

    </div>

    <!-- TEAM COLORS -->
    <div class="settings-section">

        <h3>TEAM COLORS</h3>

        <label>Girls Side</label>
        <input type="color"
               id="girlsSideColor"
               value="#ff3dcf">

        <label>Boys Side</label>
        <input type="color"
               id="boysSideColor"
               value="#29b6ff">

    </div>

    <!-- CHARACTER SIZE -->
    <div class="settings-section">

        <h3>CHARACTER SIZE</h3>

        <label>Girls</label>
        <input type="range"
               id="girlsSize"
               min="200"
               max="1200"
               value="480">

        <label>Boys</label>
        <input type="range"
               id="boysSize"
               min="200"
               max="1200"
               value="900">

    </div>

    <!-- CHARACTER POSITION -->
    <div class="settings-section">

        <h3>VERTICAL POSITION</h3>

        <label>Girls</label>
        <input type="range"
               id="girlsY"
               min="0"
               max="300"
               value="105">

        <label>Boys</label>
        <input type="range"
               id="boysY"
               min="0"
               max="300"
               value="100">

    </div>
    </div>

    <div id="characterTab" class="tab-content">

    <!-- GIRLS CHARACTER -->
    <div class="settings-section">

        <h3>LEFT CHARACTER (GIRLS)</h3>

        <!-- IDLE -->
        <div class="upload-card">

            <div class="upload-title">IDLE</div>

            <img id="girlsIdlePreview"
                 class="preview-image">

            <input type="file"
                   id="girlsIdleUpload">

        </div>

        <!-- PUNCH -->
        <div class="upload-card">

            <div class="upload-title">PUNCH</div>

            <img id="girlsPunchPreview"
                 class="preview-image">

            <input type="file"
                   id="girlsPunchUpload">

        </div>

        <!-- SUPER -->
        <div class="upload-card">

            <div class="upload-title">SUPER</div>

            <img id="girlsSuperPreview"
                 class="preview-image">

            <input type="file"
                   id="girlsSuperUpload">

        </div>

        <!-- WINNER -->
        <div class="upload-card">

            <div class="upload-title">WINNER</div>

            <img id="girlsWinnerPreview"
                 class="preview-image">

            <input type="file"
                   id="girlsWinnerUpload">

        </div>

        <!-- PANIC -->
        <div class="upload-card">

            <div class="upload-title">PANIC</div>

            <img id="girlsPanicPreview"
                 class="preview-image">

            <input type="file"
                   id="girlsPanicUpload">

        </div>

    </div>

    <!-- BOYS CHARACTER -->
    <div class="settings-section">

        <h3>RIGHT CHARACTER (BOYS)</h3>

        <!-- IDLE -->
        <div class="upload-card">

            <div class="upload-title">IDLE</div>

            <img id="boysIdlePreview"
                 class="preview-image">

            <input type="file"
                   id="boysIdleUpload">

        </div>

        <!-- PUNCH -->
        <div class="upload-card">

            <div class="upload-title">PUNCH</div>

            <img id="boysPunchPreview"
                 class="preview-image">

            <input type="file"
                   id="boysPunchUpload">

        </div>

        <!-- SUPER -->
        <div class="upload-card">

            <div class="upload-title">SUPER</div>

            <img id="boysSuperPreview"
                 class="preview-image">

            <input type="file"
                   id="boysSuperUpload">

        </div>

        <!-- WINNER -->
        <div class="upload-card">

            <div class="upload-title">WINNER</div>

            <img id="boysWinnerPreview"
                 class="preview-image">

            <input type="file"
                   id="boysWinnerUpload">

        </div>

        <!-- PANIC -->
        <div class="upload-card">

            <div class="upload-title">PANIC</div>

            <img id="boysPanicPreview"
                 class="preview-image">

            <input type="file"
                   id="boysPanicUpload">

        </div>

    </div>

</div>
<div id="effectsTab" class="tab-content">

<div class="settings-section">

<h3>EFFECTS</h3>

<label>
<input type="checkbox"
id="effectGlow"
checked>
 Character Glow
</label>

<label>
<input type="checkbox"
id="effectSway"
checked>
 Character Sway
</label>

<label>
<input type="checkbox"
id="effectWinner"
checked>
 Winner Zoom
</label>

<label>
<input type="checkbox"
id="effectLive"
checked>
 Live Badge Glow
</label>

<label>
<input type="checkbox"
id="effectBoysAura"
checked>
 Boys Aura
</label>

<label>
<input type="checkbox"
id="effectGirlsAura"
checked>
 Girls Aura
</label>

</div>

</div>
<div id="presetTab" class="tab-content">
    <!-- ACTIONS -->
<div class="settings-section">

    <h3>PRESET MANAGER</h3>

    <button id="saveSettings">
        💾 SAVE SETTINGS
    </button>

    <button id="exportPreset">
        📤 EXPORT PRESET
    </button>

    <label class="import-label">

        📥 IMPORT PRESET

        <input
        type="file"
        id="importPreset"
        accept=".json">

    </label>

    <button id="resetSettings">
        🗑 RESET ALL
    </button>
</div>
</div>

<script src="script.js"></script>
<script src="settings.js"></script>
</body>
</html>
